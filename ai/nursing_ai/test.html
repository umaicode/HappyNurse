<!doctype html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <title>Nursing STT 테스트</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 50px auto;
      padding: 20px;
    }

    button {
      padding: 15px 30px;
      font-size: 18px;
      margin: 10px;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      color: white;
    }

    #startBtn {
      background-color: #4caf50;
    }

    #stopBtn {
      background-color: #f44336;
    }

    #stopBtn:disabled,
    #startBtn:disabled {
      background-color: #ccc;
    }

    #result {
      margin-top: 20px;
      padding: 20px;
      border: 2px solid #ddd;
      border-radius: 8px;
      min-height: 100px;
      font-size: 16px;
    }

    #status {
      margin-top: 10px;
      font-size: 14px;
      color: #666;
    }
  </style>
</head>

<body>
  <h1>Nursing STT 테스트</h1>
  <div>
    <button id="startBtn" onclick="startRecording()">녹음 시작</button>
    <button id="stopBtn" onclick="stopRecording()" disabled>녹음 종료</button>
  </div>
  <div id="status">대기 중...</div>
  <hr style="margin: 30px 0;">
  <h2>파일 업로드 테스트</h2>
  <div>
    <input type="file" id="audioFile" accept="audio/*" />
    <button onclick="uploadFile()"
      style="padding: 15px 30px; font-size: 18px; background-color: #2196F3; color: white; border: none; border-radius: 8px; cursor: pointer; margin-left: 10px;">파일
      전송</button>
  </div>
  <div id="uploadStatus" style="margin-top: 10px; font-size: 14px; color: #666;">파일을 선택해주세요</div>
  <div id="result">
    <strong>원본 STT:</strong>
    <p id="originalText">-</p>
    <strong>정제된 텍스트:</strong>
    <p id="correctedText" style="color: #2196f3; font-weight: bold">-</p>
    <strong>교정 내역:</strong>
    <p id="corrections">-</p>
  </div>

  <script>
    let mediaRecorder;
    let audioChunks = [];
    let stream;
    let audioContext;

    async function startRecording() {
      document.getElementById("startBtn").disabled = true;
      document.getElementById("stopBtn").disabled = false;
      document.getElementById("status").textContent = "녹음 중...";
      audioChunks = [];

      stream = await navigator.mediaDevices.getUserMedia({
        audio: {
          sampleRate: 16000,
          channelCount: 1,
          echoCancellation: true,
          noiseSuppression: true,
        },
      });

      // AudioContext로 PCM 데이터 수집
      audioContext = new AudioContext({ sampleRate: 16000 });
      const source = audioContext.createMediaStreamSource(stream);
      const processor = audioContext.createScriptProcessor(4096, 1, 1);

      processor.onaudioprocess = (e) => {
        const float32Data = e.inputBuffer.getChannelData(0);
        // Float32 → Int16 변환
        const int16Data = new Int16Array(float32Data.length);
        for (let i = 0; i < float32Data.length; i++) {
          const s = Math.max(-1, Math.min(1, float32Data[i]));
          int16Data[i] = s < 0 ? s * 0x8000 : s * 0x7fff;
        }
        audioChunks.push(int16Data);
      };

      source.connect(processor);
      processor.connect(audioContext.destination);

      // processor 나중에 접근하기 위해 저장
      window._processor = processor;
      window._source = source;
    }

    async function stopRecording() {
      document.getElementById("startBtn").disabled = false;
      document.getElementById("stopBtn").disabled = true;
      document.getElementById("status").textContent = "STT 처리 중...";

      // 녹음 중지
      window._processor.disconnect();
      window._source.disconnect();
      stream.getTracks().forEach((track) => track.stop());
      await audioContext.close();

      // PCM 데이터를 WAV로 변환
      const wavBlob = pcmToWav(audioChunks, 16000);
      console.log(`WAV 크기: ${wavBlob.size} bytes`);

      const formData = new FormData();
      formData.append("audio", wavBlob, "recording.wav");

      try {
        const response = await fetch(
          "http://localhost:8000/api/stt/recognize",
          {
            method: "POST",
            body: formData,
          },
        );

        const data = await response.json();
        console.log("응답:", data);

        if (data.success) {
          document.getElementById("originalText").textContent =
            data.original_text || "없음";
          document.getElementById("correctedText").textContent =
            data.corrected_text || "없음";

          if (data.corrections && data.corrections.length > 0) {
            const corrList = data.corrections
              .map(
                (c) =>
                  `${c.original} → ${c.corrected || "(후보: " + c.candidates.map((cd) => cd.suggested_word).join(", ") + ")"}`,
              )
              .join("\n");
            document.getElementById("corrections").textContent = corrList;
          } else {
            document.getElementById("corrections").textContent = "교정 없음";
          }

          document.getElementById("status").textContent = "인식 완료!";
        } else {
          document.getElementById("originalText").textContent =
            "에러: " + data.detail;
          document.getElementById("status").textContent = "에러 발생";
        }
      } catch (err) {
        console.error("전송 에러:", err);
        document.getElementById("status").textContent =
          "전송 에러: " + err.message;
      }
    }

    async function uploadFile() {
      const fileInput = document.getElementById('audioFile');
      if (!fileInput.files[0]) {
        document.getElementById('uploadStatus').textContent = '파일을 선택해주세요';
        return;
      }

      const file = fileInput.files[0];
      document.getElementById('uploadStatus').textContent = 'STT 처리 중...';

      const formData = new FormData();
      formData.append('audio', file);

      // 환자 정보 추가 (입력된 경우만)
      const patientId = document.getElementById('patientId').value;
      const encounterId = document.getElementById('encounterId').value;
      const practitionerId = document.getElementById('practitionerId').value;

      let url = 'http://localhost:8000/api/stt/recognize';
      const params = [];
      if (patientId) params.push(`patient_id=${patientId}`);
      if (encounterId) params.push(`encounter_id=${encounterId}`);
      if (practitionerId) params.push(`practitioner_id=${practitionerId}`);
      if (params.length > 0) url += '?' + params.join('&');

      try {
        const response = await fetch(url, {
          method: 'POST',
          body: formData
        });

        const data = await response.json();
        console.log('응답:', data);

        if (data.success) {
          document.getElementById('originalText').textContent = data.original_text || '없음';
          document.getElementById('correctedText').textContent = data.corrected_text || '없음';

          let info = '';
          if (data.nursing_record_id) info += `기록 ID: ${data.nursing_record_id}\n`;
          if (data.audio_url) info += `음성 파일: ${data.audio_url}\n`;

          if (data.corrections && data.corrections.length > 0) {
            info += data.corrections.map(c =>
              `${c.original} → ${c.corrected || '(후보: ' + c.candidates.map(cd => cd.suggested_word).join(', ') + ')'}`
            ).join('\n');
          } else {
            info += '교정 없음';
          }

          document.getElementById('corrections').textContent = info;
          document.getElementById('uploadStatus').textContent = '인식 완료!';
        } else {
          document.getElementById('uploadStatus').textContent = '에러: ' + data.detail;
        }
      } catch (err) {
        console.error('전송 에러:', err);
        document.getElementById('uploadStatus').textContent = '전송 에러: ' + err.message;
      }
    }

    function pcmToWav(chunks, sampleRate) {
      // 전체 PCM 데이터 합치기
      const totalLength = chunks.reduce(
        (acc, chunk) => acc + chunk.length,
        0,
      );
      const pcmData = new Int16Array(totalLength);
      let offset = 0;
      for (const chunk of chunks) {
        pcmData.set(chunk, offset);
        offset += chunk.length;
      }

      // WAV 헤더 생성
      const buffer = new ArrayBuffer(44 + pcmData.byteLength);
      const view = new DataView(buffer);

      const writeString = (offset, str) => {
        for (let i = 0; i < str.length; i++) {
          view.setUint8(offset + i, str.charCodeAt(i));
        }
      };

      const numChannels = 1;
      const bitsPerSample = 16;
      const byteRate = (sampleRate * numChannels * bitsPerSample) / 8;
      const blockAlign = (numChannels * bitsPerSample) / 8;

      writeString(0, "RIFF");
      view.setUint32(4, 36 + pcmData.byteLength, true);
      writeString(8, "WAVE");
      writeString(12, "fmt ");
      view.setUint32(16, 16, true); // fmt chunk 크기
      view.setUint16(20, 1, true); // PCM 형식
      view.setUint16(22, numChannels, true); // 채널 수
      view.setUint32(24, sampleRate, true); // 샘플레이트
      view.setUint32(28, byteRate, true); // 바이트레이트
      view.setUint16(32, blockAlign, true); // 블록 정렬
      view.setUint16(34, bitsPerSample, true); // 비트 깊이
      writeString(36, "data");
      view.setUint32(40, pcmData.byteLength, true);

      // PCM 데이터 복사
      const pcmBytes = new Uint8Array(buffer, 44);
      pcmBytes.set(new Uint8Array(pcmData.buffer));

      return new Blob([buffer], { type: "audio/wav" });
    }
  </script>
</body>

</html>
