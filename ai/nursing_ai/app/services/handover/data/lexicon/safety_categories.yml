                     열상, laceration, 봉합, suture, 드레싱,
                     "피부 건조", "피부 취약", "발적", "수포",
                     blister, "삼출물", "화농성"]
    negative_terms: [피부통합성 유지, "피부 양호", "발적 없음", "이상 없음",
