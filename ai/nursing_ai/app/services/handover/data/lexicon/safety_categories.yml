    negative_terms: [DVT 없음, "혈전 없음", "VTE 위험 낮음"]

  - id: aspiration_risk
    label: 흡인위험
    enum: [고위험, 중위험, 없음, 미확인]
    positive_terms: [흡인, aspiration, 연하곤란, dysphagia, 삼킴장애,
                     구역반사, "gag reflex", 의식저하, 좌위, 반좌위,
                     "HOB 30도", 경관영양, "tube feeding", NGT,
