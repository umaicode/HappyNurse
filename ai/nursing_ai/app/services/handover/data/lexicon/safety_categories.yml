                     체위변경, "2시간마다", "에어매트리스", 체압분산,
                     뼈돌출부, 천골부, sacrum, heel, 발뒤꿈치,
                     "Braden ≤12", "Braden ≤18", "욕창 고위험",
                     "욕창 1단계", "욕창 2단계", "욕창 3단계", "욕창 4단계",
                     "ischium", "trochanter", "malleolus", "occiput",
                     "발꿈치", "엉치뼈", "욕창 예방", "실리콘 폼드레싱"]
    negative_terms: [욕창 없음, "피부 양호", "피부통합성 유지", "Braden ≥19"]

  - id: dvt_risk
    label: DVT/VTE 위험
    enum: [고위험, 중위험, 저위험, 없음, 미확인]
    positive_terms: [DVT, VTE, PE, 심부정맥혈전증, 폐색전증, 혈전,
                     thrombus, thrombosis, 탄력스타킹, 압박스타킹,
