version: "2026.05.01"
categories:
  - id: allergy
    label: 알레르기
    enum: [있음, 없음, 미확인]
    positive_terms: [알레르기, 알러지, allergy, "약물 알레르기", "음식 알레르기",
                     "조영제 알레르기", penicillin, sulfa, latex, 아나필락시스,
                     anaphylaxis, 두드러기, urticaria, 발진, rash,
                     "항생제 알레르기", "약물과민반응", "알레르기 반응"]
    negative_terms: [알레르기 없음, NKDA, NKA, "약물 알레르기 없음", "알레르기 반응 없음",
                     "이상반응 없음", "알레르기 없음 확인", "과민반응 없음"]

  - id: isolation
    label: 격리
    enum: [접촉격리, 비말격리, 공기격리, 역격리, 없음, 미확인]
    positive_terms: [격리, isolation, "contact precaution", "droplet precaution",
                     airborne, 접촉주의, 비말주의, 공기주의, 역격리,
                     MRSA, VRE, CRE, MDR, 다제내성, 음압격리,
                     "접촉격리", "격리 중", "격리실", "1인실"]
    negative_terms: [격리 해제, "no precaution", "격리 없음", "격리해제", "격리 불필요"]

  - id: fall_risk
    label: 낙상위험
    enum: [고위험, 중위험, 저위험, 없음, 미확인]
    positive_terms: [낙상위험, "fall risk", "낙상 고위험", Morse, Hendrich,
                     낙상예방, 침상난간, 미끄럼방지, 보행보조,
                     낙상력, "낙상 과거력", "낙상 발생", 낙상했음,
                     어지럼증, dizziness, 기립성저혈압,
                     "MFS ≥45", "낙상위험 고위험", "낙상예방 교육",
                     진정제, 수면제, 항경련제, 이뇨제, "낙상 고위험 약물"]
    negative_terms: [낙상위험 없음, "fall risk 없음", "저낙상위험", "MFS <25"]

  - id: dnr
    label: DNR
    enum: [있음, 없음, 미확인]
    positive_terms: [DNR, 심폐소생거부, "do not resuscitate", AND, 연명치료거부,
                     호스피스, 완화의료, 연명의료계획, "DNR 동의서"]
    negative_terms: [DNR 해제, "DNR 없음", "full code", "FULL CODE", "소생 동의"]

  - id: high_alert_med
    label: 고위험약물
    enum: [있음, 없음, 미확인]
    positive_terms: [insulin, heparin, warfarin, opioid, anticoagulant, 고위험약물,
                     morphine, fentanyl, "concentrated electrolytes", 고농도전해질,
                     KCl, MgSO4, NaHCO3, chemotherapy, 항암제,
                     항응고제, 혈당강하제, 마약성진통제, 근이완제,
                     혈전용해제, thrombolytics, digoxin, 디곡신,
                     vasopressor, epinephrine, norepinephrine, dopamine,
                     LMWH, 저분자량헤파린, 인슐린, 항암화학요법,
                     Rivaroxaban, Dabigatran, Apixaban, Warfarin,
                     "고위험약물 투여 중", "이중확인 필요"]
    negative_terms: [고위험약물 없음]

  - id: pressure_ulcer
    label: 욕창위험
    enum: [고위험, 중위험, 저위험, 없음, 발생, 미확인]
