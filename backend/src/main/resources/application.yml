spring:
  application:
    name: happynurse

  # PostgreSQL
  datasource:
    url: jdbc:postgresql://localhost:5432/happynurse
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver

  # JPA
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    defer-datasource-initialization: true

  sql:
    init:
      mode: always

# Swagger
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

# JWT
jwt:
  secret: dGhpcyBpcyBhIHNhbXBsZSBzZWNyZXQga2V5IGZvciBkZXY=
  access-token-expiration-ms: 1800000
  cookie-name: ACCESS_TOKEN
  refresh-token-expiration-ms: 604800000
  refresh-cookie-name: REFRESH_TOKEN
  cookie-secure: false
  cookie-same-site: Lax
