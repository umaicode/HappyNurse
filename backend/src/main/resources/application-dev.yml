spring:
  application:
    name: happynurse

  # PostgreSQL
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  # JPA
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    defer-datasource-initialization: true

  sql:
    init:
      mode: always

  # Redis
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST}
      port: ${SPRING_DATA_REDIS_PORT}
      database: ${SPRING_DATA_REDIS_DATABASE:1}

# Swagger (dev에서만 노출)
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    config-url: /dev/api/v3/api-docs/swagger-config
    url: /dev/api/v3/api-docs

# JWT
jwt:
  secret: ${JWT_SECRET}
  access-token-expiration-ms: 1800000
  cookie-name: ACCESS_TOKEN
  refresh-token-expiration-ms: 604800000
  app-refresh-token-expiration-ms: 2592000000
  refresh-cookie-name: REFRESH_TOKEN
  cookie-secure: false
  cookie-same-site: Lax

server:
  port: 8080

logging:
  level:
    com.ssafy.happynurse: DEBUG
    org.hibernate.SQL: DEBUG

# Dev-only toggles
app:
  dev:
    enabled: true
  nfc-secret: ${NFC-SECRET}
  webapp-base-url: ${WEBAPP-BASE-URL}